<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PA Desktop Training Enrollment Form - Task 1</title>
    <!-- Importing Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-main);
        }

        .container { 
            max-width: 500px; 
            width: 100%;
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: var(--primary);
        }

        h2 { 
            color: var(--text-main); 
            text-align: center; 
            margin-bottom: 30px;
            font-weight: 700;
            font-size: 24px;
            letter-spacing: -0.025em;
        }

        .form-group { margin-bottom: 24px; }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            font-size: 14px;
            color: var(--text-main);
        }

        input[type="text"], select { 
            width: 100%; 
            padding: 12px 16px; 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            font-size: 15px;
            transition: all 0.2s ease;
            background: white;
            outline: none;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .radio-group { 
            display: flex; 
            gap: 20px; 
            padding: 8px 0;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            border-radius: 4px;
        }

        .file-upload {
            position: relative;
            margin-top: 8px;
        }

        input[type="file"] {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .photo-preview {
            width: 100px;
            height: 100px;
            border: 2px dashed var(--border);
            border-radius: 12px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #f8fafc;
        }

        .photo-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-preview i {
            color: var(--text-secondary);
            font-size: 24px;
        }

        button { 
            width: 100%; 
            background-color: var(--primary); 
            color: white; 
            padding: 14px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        button:hover { 
            background-color: var(--primary-hover); 
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        button:active {
            transform: translateY(0);
        }

        #success-card { 
            display: none; 
            text-align: center; 
            animation: slideUp 0.5s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #success-card h3 {
            color: var(--success);
            margin-bottom: 12px;
            font-weight: 700;
        }

        .id-badge {
            display: inline-block;
            background: #ecfdf5;
            color: #065f46;
            padding: 8px 16px;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 18px;
            margin-top: 20px;
            border: 1px solid #a7f3d0;
        }

        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 4px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="form-content">
        <h2>Bineys Program Enrollment Form 2026</h2>
        <form id="regForm">
            <div class="form-group">
                <label for="studentName">Full Name</label>
                <input type="text" id="studentName" placeholder="Kwesi Biney" required>
                <p class="error-msg" id="name-error">Please enter your full name.</p>
            </div>

            <div class="form-group">
                <label>Gender</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="gender" value="Male" checked> Male
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="gender" value="Female"> Female
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="programCenter">Center (Region)</label>
                <select id="programCenter" required>
                    <option value="">Choose a location...</option>
                    <option value="Ahafo Region">Ahafo Region</option>
                    <option value="Ashanti Region">Ashanti Region</option>
                    <option value="Greater Accra Region">Greater Accra Region</option>
                    <option value="Bono Region">Bono Region</option>
                    <option value="Bono East Region">Bono East Region</option>
                    <option value="Central Region">Central Region</option>
                    <option value="Eastern Region">Eastern Region</option>
                    <option value="North East Region">North East Region</option>
                    <option value="Northern Region">Northern Region</option>
                    <option value="Oti Region">Oti Region</option>
                    <option value="Savannah Region">Savannah Region</option>
                    <option value="Upper East Region">Upper East Region</option>
                    <option value="Upper West Region">Upper West Region</option>
                    <option value="Volta Region">Volta Region</option>
                    <option value="Western Region">Western Region</option>
                    <option value="Western North Region">Western North Region</option>
                </select>
                <p class="error-msg" id="programCenter-error">Please select program center.</p>
            </div>

            <div class="form-group">
                <label class="checkbox-group">
                    <input type="checkbox" id="accommodation"> Requires Special Accommodation?
                </label>
            </div>

            <div class="form-group">
                <label for="photo">Passport Photo</label>
                <div class="file-upload">
                    <input type="file" id="photo" accept="image/*" onchange="previewImage(this)">
                </div>
                <div class="photo-preview" id="photoPreview">
                    <span style="color: #cbd5e1; font-size: 12px;">No Preview</span>
                </div>
            </div>

            <button type="button" onclick="submitForm()">Submit Registration</button>
        </form>
    </div>

    <div id="success-card">
        <div style="font-size: 48px; margin-bottom: 20px;">✅</div>
        <h3>Registration Successful!</h3>
        <p style="color: var(--text-secondary);">Your registration has been confirmed.</p>
        <div class="id-badge" id="regID"></div>
        <button type="button" style="margin-top: 30px;" onclick="location.reload()">New Registration</button>
    </div>
    <div class="container" style="color: #313a5e; font-size: 12px; text-align: center;">
        <p>2026 - Bineys</p>
        <p>This page is for testing purposes only.<br> No real data is processed.</p>
    </div>
</div>

<script>
    function previewImage(input) {
        const preview = document.getElementById('photoPreview');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
            }
            reader.readAsDataURL(input.files[0]);
        } else {
            preview.innerHTML = '<span style="color: #313a5e; font-size: 13px;">No Preview</span>';
        }
    }

    function submitForm() {
        const nameInput = document.getElementById('studentName');
        const centerSelect = document.getElementById('programCenter');
        const nameError = document.getElementById('name-error');
        const centerError = document.getElementById('programCenter-error');

        const name = nameInput.value.trim();
        const center = centerSelect.value;
        
        // Clear previous states
        nameError.style.display = 'none';
        centerError.style.display = 'none';
        nameInput.style.borderColor = '';
        centerSelect.style.borderColor = '';

        if (!name) {
            nameError.style.display = 'block';
            nameInput.style.borderColor = '#ef4444';
            return;
        }

        if (!center) {
            centerError.style.display = 'block';
            centerSelect.style.borderColor = '#ef4444';
            return;
        }

        const fname = name.split(' ')[0];
        const formattedName = fname.charAt(0).toUpperCase() + fname.slice(1).toLowerCase();

        const id = Math.floor(Math.random() * 90000) + 10000;
        document.getElementById('form-content').style.display = 'none';
        document.getElementById('success-card').style.display = 'block';
        document.getElementById('regID').innerText = `${formattedName} your ID is: PAD26-${id}`;
    }
</script>

</body>
</html>
